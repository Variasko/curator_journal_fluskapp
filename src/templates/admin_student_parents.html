{% extends "base.html" %}
{% block content %}
<div class="card">
  <div class="card-header">
    <h2 class="card-title">{{ title }}</h2>
    <div style="display: flex; gap: 0.75rem;">
      <a href="/adminpanel" class="btn btn-cancel">← Назад</a>
      <a href="#modal" class="btn btn-add">+ Привязать</a>
    </div>
  </div>
  <table>
    <thead><tr><th>Студент</th><th>Родитель</th><th style="width: 100px;">Действия</th></tr></thead>
    <tbody>
      {% for row in table_data %}
      <tr>
        <td>{{ row.s_name }}</td>
        <td>{{ row.p_name }}</td>
        <td class="actions">
          <form method="POST" style="display:inline;">
            <input type="hidden" name="action" value="delete">
            <input type="hidden" name="student_id" value="{{ row.student_id }}">
            <input type="hidden" name="parent_id" value="{{ row.parent_id }}">
            <button type="submit" class="btn-icon btn-delete"><svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
          </form>
        </td>
      </tr>
      {% else %}<tr><td colspan="3" style="text-align:center; color:var(--muted); padding: 2rem;">Пусто</td></tr>{% endfor %}
    </tbody>
  </table>
</div>
<div id="modal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">Привязать родителя</div>
    <form method="POST">
      <input type="hidden" name="action" value="add">
      <div class="form-group">
        <label>Студент</label>
        <select name="student_id" required>
          <option value="">Выберите студента...</option>
          {% for s in students %}<option value="{{ s.person_id }}">{{ s.person.surname }} {{ s.person.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Родитель</label>
        <select name="parent_id" required>
          <option value="">Выберите родителя...</option>
          {% for p in parents %}<option value="{{ p.parent_id }}">{{ p.surname }} {{ p.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="modal-footer">
        <a href="{{ url_for('student_parents.manage_student_parents') }}" class="btn btn-cancel">Отмена</a>
        <button type="submit" class="btn btn-save">Привязать</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
