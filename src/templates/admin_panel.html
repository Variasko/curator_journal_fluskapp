{% extends "base.html" %}

{% block content %}
<div class="card">
  <div class="card-header">
    <h2 class="card-title">Управление системой</h2>
  </div>
  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem;">
    <a href="/admin/curators" class="btn btn-add" style="padding: 1.5rem; justify-content: center; font-size: 1rem;">
      <svg viewBox="0 0 24 24" style="width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Кураторы
    </a>
    <a href="/admin/groups" class="btn btn-add" style="padding: 1.5rem; justify-content: center; font-size: 1rem; opacity: 0.6; pointer-events: none;">
      <svg viewBox="0 0 24 24" style="width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2;"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Группы (скоро)
    </a>
    <a href="/admin/students" class="btn btn-add" style="padding: 1.5rem; justify-content: center; font-size: 1rem; opacity: 0.6; pointer-events: none;">
      <svg viewBox="0 0 24 24" style="width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2;"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Студенты (скоро)
    </a>
  </div>
</div>
{% endblock %}
