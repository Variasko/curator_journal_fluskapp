{% extends "base.html" %}

{% block content %}
<div class="error-container" style="text-align: center; padding: 3rem;">
    <h1 style="font-size: 6rem; color: var(--primary); margin: 0;">404</h1>
    <h2 style="margin: 1rem 0;">Страница не найдена</h2>
    <p style="color: var(--muted); margin-bottom: 2rem;">
        Запрашиваемая страница не существует или была перемещена.
    </p>
    <a href="/" class="btn btn-primary" style="display: inline-block; padding: 0.75rem 1.5rem; background: var(--primary); color: white; text-decoration: none; border-radius: 8px;">
        Вернуться на главную
    </a>
</div>
{% endblock %}
